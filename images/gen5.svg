<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="psGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003087;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f4788;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="200" fill="#1a1a2e"/>
  
  <!-- PlayStation Console -->
  <rect x="60" y="50" width="180" height="100" fill="url(#psGradient)" rx="8"/>
  
  <!-- Screen reflection -->
  <rect x="70" y="60" width="160" height="75" fill="rgba(255,255,255,0.1)" rx="5"/>
  
  <!-- Logo/Text -->
  <text x="150" y="110" font-size="32" font-weight="bold" fill="#00a0ff" text-anchor="middle" font-family="Arial">PLAY</text>
  <text x="150" y="130" font-size="12" fill="#00a0ff" text-anchor="middle" font-family="Arial">STATION</text>
  
  <!-- Controller indicator -->
  <circle cx="80" cy="160" r="5" fill="#e94560"/>
  <circle cx="140" cy="160" r="5" fill="#e94560"/>
  <circle cx="200" cy="160" r="5" fill="#e94560"/>
</svg>