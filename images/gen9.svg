<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="ps5Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ps5Dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#222222;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="200" fill="#1a1a2e"/>
  
  <!-- PS5 Main body (curved design) -->
  <path d="M 110 80 Q 95 90 110 130 L 130 135 L 130 75 Q 120 75 110 80" fill="url(#ps5Gradient)" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
  <path d="M 170 80 Q 185 90 170 130 L 150 135 L 150 75 Q 160 75 170 80" fill="url(#ps5Gradient)" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
  
  <!-- Dark center section -->
  <rect x="130" y="75" width="20" height="60" fill="url(#ps5Dark)" rx="3"/>
  
  <!-- Disc drive on center -->
  <circle cx="140" cy="105" r="10" fill="rgba(0,0,0,0.3)" stroke="rgba(233,69,122,0.4)" stroke-width="1.5"/>
  
  <!-- Light accents -->
  <rect x="125" y="70" width="50" height="3" fill="rgba(233,69,122,0.5)" rx="1"/>
  
  <!-- LED indicator -->
  <circle cx="140" cy="125" r="3" fill="#ff006e"/>
  
  <!-- Text -->
  <text x="150" y="155" font-size="24" font-weight="bold" fill="#ff006e" text-anchor="middle" font-family="Arial">PS5</text>
  <text x="150" y="172" font-size="11" fill="#888888" text-anchor="middle" font-family="Arial">Next-Gen | Ray Tracing</text>
</svg>