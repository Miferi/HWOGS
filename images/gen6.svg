<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="ps2Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333333;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="200" fill="#1a1a2e"/>
  
  <!-- PS2 Console (slim design) -->
  <rect x="80" y="50" width="140" height="95" fill="url(#ps2Gradient)" rx="6"/>
  
  <!-- DVD Drive slot -->
  <rect x="90" y="65" width="120" height="20" fill="rgba(255,255,255,0.1)" rx="3"/>
  <line x1="150" y1="65" x2="150" y2="85" stroke="rgba(233,69,122,0.4)" stroke-width="2"/>
  
  <!-- Power button -->
  <circle cx="95" cy="95" r="5" fill="#00ff00"/>
  
  <!-- Network port -->
  <rect x="200" y="75" width="12" height="8" fill="rgba(233,69,122,0.6)" rx="1"/>
  
  <!-- Text -->
  <text x="150" y="130" font-size="24" font-weight="bold" fill="#00ff00" text-anchor="middle" font-family="Arial">PS2</text>
  <text x="150" y="150" font-size="10" fill="#888888" text-anchor="middle" font-family="Arial">155M+ Vendas</text>
</svg>