<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="ps3Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#222222;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="300" height="200" fill="#1a1a2e"/>
  
  <!-- PS3 Console (boomerang design) -->
  <path d="M 80 100 Q 100 50 150 50 Q 200 50 220 100 Q 220 130 150 130 Q 100 130 80 100" fill="url(#ps3Gradient)" stroke="rgba(233,69,122,0.5)" stroke-width="2"/>
  
  <!-- PS3 Buttons -->
  <circle cx="120" cy="95" r="6" fill="#e94560"/>
  <circle cx="140" cy="85" r="6" fill="#00ff00"/>
  <circle cx="160" cy="85" r="6" fill="#ff0000"/>
  <circle cx="180" cy="95" r="6" fill="#0099ff"/>
  
  <!-- Center stripe -->
  <rect x="145" y="55" width="10" height="75" fill="rgba(0,153,255,0.3)" rx="2"/>
  
  <!-- Text -->
  <text x="150" y="155" font-size="20" font-weight="bold" fill="#0099ff" text-anchor="middle" font-family="Arial">PS3</text>
  <text x="150" y="172" font-size="11" fill="#888888" text-anchor="middle" font-family="Arial">Blu-ray | HD Gaming</text>
</svg>